<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migrador Latam5S (Firebase -> Sheets)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800 p-8 flex flex-col items-center min-h-screen">

    <div class="bg-white rounded-xl shadow-xl p-8 w-full max-w-2xl">
        <h1 class="text-3xl font-bold text-center text-orange-600 mb-2">Herramienta de Migración</h1>
        <p class="text-center text-gray-500 mb-8">De Firebase (Antiguo) a Google Sheets (Nuevo)</p>

        <!-- 1. CONFIGURACIÓN -->
        <div class="mb-6 bg-orange-50 p-4 rounded-lg border border-orange-200">
            <h2 class="font-bold text-orange-800 mb-2">1. Pega aquí tu URL de Google Apps Script</h2>
            <input type="text" id="gas-url" placeholder="https://script.google.com/macros/s/AKfycbz.../exec" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-orange-400">
        </div>

        <!-- 2. LOGIN FIREBASE -->
        <div id="login-section" class="mb-6 p-4 border border-gray-200 rounded-lg">
            <h2 class="font-bold text-gray-700 mb-4">2. Inicia sesión en tu cuenta antigua (Firebase)</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="email" id="fb-email" placeholder="Correo de Firebase" class="p-2 border border-gray-300 rounded">
                <input type="password" id="fb-password" placeholder="Contraseña" class="p-2 border border-gray-300 rounded">
            </div>
            <button id="btn-login" class="mt-4 w-full bg-gray-800 text-white font-bold py-2 px-4 rounded hover:bg-gray-900 transition">
                Conectar con Firebase
            </button>
            
            <div class="mt-4 flex items-center justify-between">
                <hr class="w-full border-gray-300">
                <span class="px-2 text-gray-500 text-sm">O</span>
                <hr class="w-full border-gray-300">
            </div>
            <button id="btn-google-login" class="mt-4 w-full bg-white border border-gray-300 text-gray-700 font-bold py-2 px-4 rounded hover:bg-gray-50 transition flex justify-center items-center gap-2">
                <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Ingresar con Google
            </button>

            <p id="login-status" class="mt-2 text-sm text-center font-medium hidden"></p>
        </div>

        <!-- 3. MIGRAR -->
        <div id="migrate-section" class="opacity-50 pointer-events-none transition-opacity duration-300">
            <h2 class="font-bold text-gray-700 mb-4 text-center">3. Extraer y Migrar Datos</h2>
            <button id="btn-migrate" class="w-full bg-green-600 text-white font-bold py-4 px-4 rounded-lg text-lg hover:bg-green-700 shadow-lg flex items-center justify-center gap-2 transition">
                🚀 Iniciar Migración a Sheets
            </button>
            
            <div id="migration-logs" class="mt-4 bg-gray-900 text-green-400 font-mono text-sm p-4 rounded-lg h-48 overflow-y-auto hidden">
                > Esperando inicio de migración...<br>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración original de Firebase de tu código
        const firebaseConfig = {
            apiKey: "AIzaSyBe_H0VfS-8K-n3Ihu-Io2q4SYDZAwbKoQ",
            authDomain: "compliventas-fc79c.firebaseapp.com",
            projectId: "compliventas-fc79c",
            storageBucket: "compliventas-fc79c.firebasestorage.app",
            messagingSenderId: "734491005717",
            appId: "1:734491005717:web:85f0be05bc345cfd6bcf1c"
        };
        const appIdStr = 'mi-app-ventas';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUserId = null;

        const logContainer = document.getElementById('migration-logs');
        function logMsg(msg, isError = false) {
            logContainer.classList.remove('hidden');
            const color = isError ? 'text-red-400' : 'text-green-400';
            logContainer.innerHTML += `<span class="${color}">> ${msg}</span><br>`;
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // --- LOGIN FIREBASE ---
        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('fb-email').value;
            const pass = document.getElementById('fb-password').value;
            const statusEl = document.getElementById('login-status');
            
            if(!email || !pass) return alert("Faltan credenciales");
            
            statusEl.classList.remove('hidden');
            statusEl.textContent = "Conectando...";
            statusEl.className = "mt-2 text-sm text-center font-medium text-blue-600";

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                currentUserId = userCredential.user.uid;
                
                statusEl.textContent = "¡Conectado exitosamente! UID: " + currentUserId;
                statusEl.className = "mt-2 text-sm text-center font-medium text-green-600";
                
                document.getElementById('login-section').classList.add('opacity-50', 'pointer-events-none');
                document.getElementById('migrate-section').classList.remove('opacity-50', 'pointer-events-none');
            } catch (error) {
                statusEl.textContent = "Error: " + error.message;
                statusEl.className = "mt-2 text-sm text-center font-medium text-red-600";
            }
        });

        // --- LOGIN GOOGLE ---
        document.getElementById('btn-google-login').addEventListener('click', async () => {
            const statusEl = document.getElementById('login-status');
            
            statusEl.classList.remove('hidden');
            statusEl.textContent = "Abriendo ventana de Google...";
            statusEl.className = "mt-2 text-sm text-center font-medium text-blue-600";

            try {
                const provider = new GoogleAuthProvider();
                const userCredential = await signInWithPopup(auth, provider);
                currentUserId = userCredential.user.uid;
                
                statusEl.textContent = "¡Conectado exitosamente! UID: " + currentUserId;
                statusEl.className = "mt-2 text-sm text-center font-medium text-green-600";
                
                document.getElementById('login-section').classList.add('opacity-50', 'pointer-events-none');
                document.getElementById('migrate-section').classList.remove('opacity-50', 'pointer-events-none');
            } catch (error) {
                statusEl.textContent = "Error: " + error.message;
                statusEl.className = "mt-2 text-sm text-center font-medium text-red-600";
            }
        });

        // --- LÓGICA DE EXTRACCIÓN Y MIGRACIÓN ---
        document.getElementById('btn-migrate').addEventListener('click', async () => {
            const gasUrl = document.getElementById('gas-url').value;
            if (!gasUrl.includes("script.google.com/macros/s/")) {
                return alert("Por favor ingresa una URL válida de Apps Script.");
            }
            if (!currentUserId) return alert("No estás conectado a Firebase.");

            document.getElementById('btn-migrate').disabled = true;
            document.getElementById('btn-migrate').textContent = "Migrando (Por favor espera)...";
            logContainer.innerHTML = '';
            
            try {
                const payload = {
                    clients: [],
                    products: [],
                    sales: [],
                    saleItems: []
                };

                // 1. Extraer Clientes
                logMsg("Extrayendo Clientes...");
                const clientsSnap = await getDocs(collection(db, `artifacts/${appIdStr}/users/${currentUserId}/clients`));
                clientsSnap.forEach(doc => {
                    payload.clients.push({ id: doc.id, phone: doc.data().phone });
                });
                logMsg(`✅ ${payload.clients.length} Clientes extraídos.`);

                // 2. Extraer Productos
                logMsg("Extrayendo Productos...");
                const productsSnap = await getDocs(collection(db, `artifacts/${appIdStr}/users/${currentUserId}/products`));
                productsSnap.forEach(doc => {
                    const d = doc.data();
                    payload.products.push({ id: doc.id, name: d.name, stock: d.stock, cost: d.cost, purchaseDate: d.purchaseDate || '' });
                });
                logMsg(`✅ ${payload.products.length} Productos extraídos.`);

                // 3. Extraer Ventas (Padres)
                logMsg("Extrayendo Registro de Ventas...");
                const salesSnap = await getDocs(collection(db, `artifacts/${appIdStr}/users/${currentUserId}/sales`));
                salesSnap.forEach(doc => {
                    const d = doc.data();
                    payload.sales.push({
                        id: doc.id, clientId: d.clientId || '', clientName: d.clientName || '', clientPhone: d.clientPhone || '',
                        date: d.date || '', medioDePago: d.medioDePago || '', total: d.total || 0, totalCosto: d.totalCosto || 0, enviado: d.enviado || false
                    });
                });
                logMsg(`✅ ${payload.sales.length} Ventas extraídas.`);

                // 4. Extraer Items de Ventas
                logMsg("Extrayendo Items Vendidos...");
                const itemsSnap = await getDocs(collection(db, `artifacts/${appIdStr}/users/${currentUserId}/saleItems`));
                itemsSnap.forEach(doc => {
                    const d = doc.data();
                    payload.saleItems.push({
                        id: doc.id, saleId: d.saleId || '', clientId: d.clientId || '', clientName: d.clientName || '',
                        date: d.date || '', medioDePago: d.medioDePago || '', enviado: d.enviado || false, fechaEnvio: d.fechaEnvio || '',
                        productId: d.productId || '', desc: d.desc || '', qty: d.qty || 0, price: d.price || 0, costo: d.costo || 0,
                        total: d.total || 0, totalCosto: d.totalCosto || 0, color: d.color || '', talla: d.talla || ''
                    });
                });
                logMsg(`✅ ${payload.saleItems.length} Items de venta extraídos.`);


                // --- ENVIAR A GOOGLE SHEETS ---
                logMsg("===================================");
                logMsg("Enviando todos los datos a Google Sheets...");
                logMsg("Esto puede tardar unos segundos...");

                const response = await fetch(gasUrl, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'bulkImport', payload: payload })
                });

                const result = await response.json();

                if (result.success) {
                    logMsg("🎉 ¡MIGRACIÓN COMPLETADA CON ÉXITO!");
                    logMsg("Revisa tu documento de Google Sheets, las pestañas deberían estar llenas.");
                    document.getElementById('btn-migrate').textContent = "¡Migración Exitosa!";
                    document.getElementById('btn-migrate').classList.replace('bg-green-600', 'bg-gray-400');
                } else {
                    throw new Error(result.error);
                }

            } catch (error) {
                console.error(error);
                logMsg(`❌ ERROR: ${error.message}`, true);
                document.getElementById('btn-migrate').disabled = false;
                document.getElementById('btn-migrate').textContent = "Reintentar Migración";
            }
        });
    </script>
</body>
</html>
